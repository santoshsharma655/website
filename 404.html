<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Found a Bug</title>
    <!-- Correctly Linked CSS File -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="ss-404-body">

    <div class="ss-404-bg-glow"></div>

    <div class="ss-404-container">
        <div class="ss-404-error-code">404</div>
        <h1 class="ss-404-error-title">Whoops! Look like a 404 Bug 🐛</h1>
        
        <p class="ss-404-error-message">
            The page you are looking for has been moved, deleted, or perhaps never existed. 
            Don't worry, even the best developers write buggy URLs sometimes!
        </p>

        <!-- Fun / Entertainment Element -->
        <div class="ss-404-dev-joke">
            "I told my server a joke about a missing page, but it couldn't find the punchline." 🤷‍♂️
        </div>

        <div class="ss-404-btn-group">
            <a href="/" class="ss-404-btn ss-404-btn-primary">Back to Home</a>
            <a href="/services/" class="ss-404-btn ss-404-btn-secondary">View Services</a>
        </div>
    </div>

</body>
</html>
